<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Match Game</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Orbitron', sans-serif;
}

body{
    background: radial-gradient(circle at top, #011507, #000000);
    color:#00ffcc;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:400px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border:1px solid rgba(0,255,200,0.2);
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow: 0 0 30px rgba(0,255,200,0.1);
}

h1{
    font-size:22px;
    margin-bottom:20px;
}

#targetTime{
    font-size:18px;
    opacity:0.8;
}

#currentTime{
    font-size:55px;
    margin:20px 0;
    font-weight:bold;
    color:#00ff88;
}
.buttons{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-top:10px;
}

button{
    flex:1;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    transition:0.2s;
    font-weight:bold;
}

#startBtn{
    background:#00ff88;
    color:black;
}

#startBtn:hover{
    background:#00cc6a;
}

#stopBtn{
    background:#ff3b3b;
    color:white;
}

#stopBtn:hover{
    background:#cc2c2c;
}

button:disabled{
    opacity:0.5;
    cursor:not-allowed;
}

#result{
    margin-top:20px;
    font-size:18px;
}

.nametag{
    font-size: 10px;
    position: absolute;
    color: gray;
    bottom: 50px;
}

@media(max-width:480px){
    .container{
        padding:20px;
    }

    #currentTime{
        font-size:45px;
    }

    button{
        font-size:14px;
        padding:12px;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>⏱ Time Match Game</h1>

    <h2 id="targetTime">Target: --</h2>
    <h2 id="currentTime">0.00</h2>

    <div class="buttons">
        <button id="startBtn">START</button>
        <button id="stopBtn" disabled>STOP</button>
    </div>

    <h2 id="result"></h2>

</div>

<div class="nametag">Made by Wenxyz</div>

<audio id="winSound">
    <source src="win.mp3">
</audio>

<script src="script.js"></script>
</body>
</html>
